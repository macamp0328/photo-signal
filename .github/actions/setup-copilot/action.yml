name: 'Setup Copilot Documentation'
description: 'Pre-fetches GitHub Copilot documentation before firewall restrictions apply'
author: 'Photo Signal Team'

runs:
  using: 'composite'
  steps:
    - name: Create documentation cache directory
      shell: bash
      run: |
        mkdir -p /tmp/gh-docs
        echo "Created /tmp/gh-docs directory for caching GitHub documentation"

    - name: Fetch GitHub Copilot best practices
      shell: bash
      run: |
        echo "Fetching GitHub Copilot coding agent tips..."
        if curl -L --fail --silent --show-error --max-time 30 \
          https://gh.io/copilot-coding-agent-tips \
          > /tmp/gh-docs/copilot-best-practices.html; then
          echo "✓ Successfully fetched copilot-coding-agent-tips"
          echo "  Saved to: /tmp/gh-docs/copilot-best-practices.html"
          ls -lh /tmp/gh-docs/copilot-best-practices.html
        else
          echo "⚠ Warning: Failed to fetch copilot-coding-agent-tips"
          echo "  Creating placeholder file..."
          echo "GitHub Copilot documentation fetch failed" > /tmp/gh-docs/copilot-best-practices.html
        fi

    - name: Fetch GitHub Actions setup documentation
      shell: bash
      run: |
        echo "Fetching GitHub Copilot Actions setup documentation..."
        if curl -L --fail --silent --show-error --max-time 30 \
          https://gh.io/copilot/actions-setup-steps \
          > /tmp/gh-docs/actions-setup-steps.html; then
          echo "✓ Successfully fetched actions-setup-steps"
          echo "  Saved to: /tmp/gh-docs/actions-setup-steps.html"
          ls -lh /tmp/gh-docs/actions-setup-steps.html
        else
          echo "⚠ Warning: Failed to fetch actions-setup-steps"
          echo "  Creating placeholder file..."
          echo "GitHub Actions setup documentation fetch failed" > /tmp/gh-docs/actions-setup-steps.html
        fi

    - name: Display cache summary
      shell: bash
      run: |
        echo "========================================="
        echo "GitHub Documentation Cache Summary"
        echo "========================================="
        echo "Cache location: /tmp/gh-docs/"
        echo ""
        if [ -d /tmp/gh-docs ]; then
          echo "Cached files:"
          ls -lh /tmp/gh-docs/ || echo "  (no files found)"
          echo ""
          echo "Total cache size: $(du -sh /tmp/gh-docs/ | cut -f1)"
        else
          echo "  Cache directory not found"
        fi
        echo "========================================="
