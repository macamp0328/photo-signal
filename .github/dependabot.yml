version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '06:00'
    open-pull-requests-limit: 2
    versioning-strategy: increase-if-necessary
    groups:
      dev-dependencies:
        patterns:
          - '@types/*'
          - '@vitejs/*'
          - '@vitest/*'
          - 'eslint*'
          - 'prettier'
          - 'typescript*'
          - 'vite'
          - 'vitest'
          - 'happy-dom'
        update-types:
          - 'minor'
          - 'patch'
      production-dependencies:
        patterns:
          - 'react'
          - 'react-dom'
          - 'howler'
        update-types:
          - 'minor'
          - 'patch'
    labels:
      - 'dependencies'
      - 'automated'
      - 'npm'
    ignore:
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint-plugin-react-hooks'
        versions: ['>=6.0.0']
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '06:00'
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - 'actions/*'
          - 'codecov/*'
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      - dependency-name: 'actions/checkout'
        update-types: ['version-update:semver-major']
      - dependency-name: 'actions/setup-node'
        versions: ['>=6.0.0']
      - dependency-name: 'codecov/codecov-action'
        update-types: ['version-update:semver-major']
    labels:
      - 'dependencies'
      - 'github-actions'
      - 'automated'
      - 'ci'
    commit-message:
      prefix: 'chore(ci)'
