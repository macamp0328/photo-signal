# CI Workflow for Photo Signal
#
# 📚 IMPORTANT FOR AI AGENTS:
# When adding/removing/modifying any of the following, update DOCUMENTATION_INDEX.md:
#   - New documentation files (*.md)
#   - New configuration files (*.json, *.js, *.ts config files)
#   - New modules or services (with their README.md files)
#   - New GitHub workflows or templates
#   - New development environment configs
#
# See DOCUMENTATION_INDEX.md for the complete documentation structure.
#
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-format-type-check-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting with Prettier
        run: npm run format:check

      - name: Type-check with TypeScript
        run: npm run type-check

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
