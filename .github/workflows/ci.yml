# CI Workflow for Photo Signal
#
# 📚 IMPORTANT FOR AI AGENTS:
# When adding/removing/modifying any of the following, update DOCUMENTATION_INDEX.md:
#   - New documentation files (*.md)
#   - New configuration files (*.json, *.js, *.ts config files)
#   - New modules or services (with their README.md files)
#   - New GitHub workflows or templates
#   - New development environment configs
#
# See DOCUMENTATION_INDEX.md for the complete documentation structure.
#
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-format-type-check-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write # For coverage comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Temporarily disabled to debug GitHub agent timeouts (Nov 11, 2025)
      # - name: Setup Copilot documentation cache
      #   uses: ./.github/actions/setup-copilot

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies for vulnerabilities
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting with Prettier
        run: npm run format:check

      - name: Type-check with TypeScript
        run: npm run type-check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-photo-signal
          fail_ci_if_error: false

      - name: Build project
        run: npm run build

      - name: Check bundle size
        run: ./scripts/check-bundle-size.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
