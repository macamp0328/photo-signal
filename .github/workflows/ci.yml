# CI Workflow for Photo Signal
#
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/dependabot.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/dependabot.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format-type-check-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write # For coverage comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # assets/ holds ~118 MB of test videos not needed by CI.
          # Sparse checkout cuts checkout time significantly on cold runners.
          sparse-checkout: |
            src
            public
            tests
            scripts
            cloudflare
            .github
            docs
          sparse-checkout-cone-mode: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies for vulnerabilities
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting with Prettier
        run: npm run format:check

      - name: Type-check with TypeScript
        run: npm run type-check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-photo-signal
          fail_ci_if_error: false

      - name: Build project
        run: npm run build

      - name: Build audio data artifacts
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const source = JSON.parse(fs.readFileSync('public/data.app.v2.json', 'utf8'));
          const artistsById = new Map((source?.artists ?? []).map((artist) => [artist.id, artist]));
          const tracks = Array.isArray(source?.tracks)
            ? source.tracks.map((track, index) => ({
                id: String(index + 1),
                band: String(artistsById.get(track.artistId)?.name ?? ''),
                songTitle: String(track.songTitle ?? ''),
                fileName: String(track.audioFile ?? '').split('/').pop() || 'track-' + (index + 1) + '.opus',
              }))
            : [];

          fs.writeFileSync('/tmp/audio-index.ci.json', JSON.stringify({ tracks }, null, 2));
          NODE
          npm run audio:build-data -- --audio-index=/tmp/audio-index.ci.json --output-v2=/tmp/data.app.v2.json --output-recognition=/tmp/data.recognition.v2.json
          test -f /tmp/data.app.v2.json
          test -f /tmp/data.recognition.v2.json
          node <<'NODE'
          const fs = require('node:fs');

          const appV2 = JSON.parse(fs.readFileSync('/tmp/data.app.v2.json', 'utf8'));
          const recognitionV2 = JSON.parse(fs.readFileSync('/tmp/data.recognition.v2.json', 'utf8'));

          const appValid =
            appV2?.version === 2 &&
            Array.isArray(appV2?.artists) &&
            Array.isArray(appV2?.photos) &&
            Array.isArray(appV2?.tracks) &&
            Array.isArray(appV2?.entries) &&
            appV2.entries.length > 0;

          const recognitionValid =
            recognitionV2?.version === 2 &&
            Array.isArray(recognitionV2?.entries) &&
            recognitionV2.entries.every(
              (entry) => Number.isInteger(entry?.concertId) && Array.isArray(entry?.phash)
            );

          if (!appValid) {
            throw new Error('Invalid generated /tmp/data.app.v2.json schema/content');
          }

          if (!recognitionValid) {
            throw new Error('Invalid generated /tmp/data.recognition.v2.json schema/content');
          }
          NODE

      - name: Check bundle size
        run: ./scripts/check-bundle-size.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7
