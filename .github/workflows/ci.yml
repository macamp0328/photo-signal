# CI Workflow for Photo Signal
#
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format-type-check-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write # For coverage comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies for vulnerabilities
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting with Prettier
        run: npm run format:check

      - name: Type-check with TypeScript
        run: npm run type-check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-photo-signal
          fail_ci_if_error: false

      - name: Build project
        run: npm run build

      - name: Build audio data artifacts
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const source = JSON.parse(fs.readFileSync('public/data.json', 'utf8'));
          const concerts = Array.isArray(source?.concerts) ? source.concerts : [];
          const tracks = concerts.map((concert, index) => ({
            id: String(index + 1),
            band: String(concert.band ?? ''),
            songTitle: String(concert.songTitle ?? ''),
            fileName: String(concert.audioFile ?? '').split('/').pop() || 'track-' + (index + 1) + '.opus',
          }));

          fs.writeFileSync('/tmp/audio-index.ci.json', JSON.stringify({ tracks }, null, 2));
          NODE
          npm run audio:build-data -- --audio-index=/tmp/audio-index.ci.json --output=/tmp/data.json --output-v2=/tmp/data.app.v2.json --output-recognition=/tmp/data.recognition.v2.json
          test -f /tmp/data.json
          test -f /tmp/data.app.v2.json
          test -f /tmp/data.recognition.v2.json

      - name: Verify v2 runtime artifacts for this deploy environment
        env:
          NODE_ENV: production
          VITE_DEPLOY_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
        run: npm run data:check-v2-artifacts

      - name: Check bundle size
        run: ./scripts/check-bundle-size.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage/
          retention-days: 7
