# Close Stale Failing PRs - Auto-close PRs with failing checks after 7 days
#
# This workflow enforces the AI Agent PR Policy by automatically closing
# pull requests that have had failing CI checks for more than 7 days.
#
# Policy: As per CONTRIBUTING.md, AI agents must fix failing checks within
# 7 days or the PR may be closed.
#
name: Close Stale Failing PRs

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      stale_days:
        description: 'Number of days before closing stale failing PRs'
        required: false
        default: '7'
        type: number

permissions:
  pull-requests: write
  issues: write

jobs:
  close-stale-failing:
    runs-on: ubuntu-latest

    steps:
      - name: Find and close stale failing PRs
        uses: actions/github-script@v8
        with:
          script: |
            const STALE_DAYS = ${{ inputs.stale_days || 7 }};
            const MS_PER_DAY = 24 * 60 * 60 * 1000;

            // Get all open PRs using pagination
            let totalPRs = 0;
            for await (const { data: prs } of github.paginate.iterator(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            })) {
              totalPRs += prs.length;
              
              for (const pr of prs) {
                try {
                  // Check if PR has ci-failing label
                  const hasFailingLabel = pr.labels.some(label => 
                    label.name === 'ci-failing'
                  );

                  if (!hasFailingLabel) {
                    continue;
                  }

                  console.log(`\nChecking PR #${pr.number}: ${pr.title}`);

                  // Get all PR comments using pagination
                  const comments = await github.paginate(github.rest.issues.listComments, {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number
                  });

                  // Find all ci-failure comments
                  const failureComments = comments.filter(comment =>
                    comment.body.includes('ci-failure-')
                  );

                  if (failureComments.length === 0) {
                    console.log(`  No failure comments found, skipping`);
                    continue;
                  }

                  // Get the most recent failure comment date
                  const mostRecentFailure = failureComments.sort((a, b) => 
                    new Date(b.created_at) - new Date(a.created_at)
                  )[0];

                  const failureDate = new Date(mostRecentFailure.created_at);
                  const now = new Date();
                  const daysSinceFailure = (now - failureDate) / MS_PER_DAY;

                  console.log(`  Failure most recently reported: ${failureDate.toISOString()}`);
                  console.log(`  Days since most recent failure: ${daysSinceFailure.toFixed(1)}`);

                  // Check if there's a success comment after the most recent failure
                  const successComments = comments.filter(comment =>
                    comment.body.includes('All Checks Passing') &&
                    new Date(comment.created_at) > failureDate
                  );

                  if (successComments.length > 0) {
                    console.log(`  PR has been fixed (found success comment after most recent failure), skipping`);
                    continue;
                  }

                  // Check if PR is stale (>7 days with failing checks)
                  if (daysSinceFailure >= STALE_DAYS) {
                    console.log(`  ⚠️ PR is stale (${daysSinceFailure.toFixed(1)} days), closing...`);

                    // Post closing comment
                    const closingMessage = [
                      '## 🚫 PR Closed - Failing Checks Not Resolved',
                      '',
                      `This PR has had failing GitHub Actions checks for **${Math.floor(daysSinceFailure)} days** without resolution.`,
                      '',
                      '### Policy Enforcement',
                      '',
                      'As per [CONTRIBUTING.md](/CONTRIBUTING.md#ai-agent-pr-policy):',
                      '',
                      '> PRs with failing checks must be fixed within 7 days or the PR may be closed.',
                      '',
                      '### What Happened',
                      '',
                      `- Most recent failure: ${failureDate.toISOString().split('T')[0]}`,
                      `- Days without fix: ${Math.floor(daysSinceFailure)}`,
                      '- Status: All checks must pass before merge',
                      '',
                      '### Next Steps',
                      '',
                      'If you still want to pursue this change:',
                      '',
                      '1. Fix all failing checks locally',
                      '2. Ensure all quality gates pass:',
                      '   ```bash',
                      '   npm run lint:fix',
                      '   npm run format',
                      '   npm run type-check',
                      '   npm run build',
                      '   npm run test:run',
                      '   ```',
                      '3. Open a new PR with working code',
                      '',
                      '### Resources',
                      '',
                      '- [CONTRIBUTING.md](/CONTRIBUTING.md) - Complete contribution guidelines',
                      '- [SETUP.md](/SETUP.md) - Development environment setup',
                      '- [AI_AGENT_GUIDE.md](/AI_AGENT_GUIDE.md) - AI agent collaboration guide',
                      '',
                      '---',
                      '',
                      '**Note**: This is an automated action enforcing quality standards. We welcome contributions that meet our quality gates!'
                    ].join('\n');

                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: pr.number,
                      body: closingMessage
                    });

                    // Close the PR
                    await github.rest.pulls.update({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: pr.number,
                      state: 'closed'
                    });

                    console.log(`  ✅ Closed PR #${pr.number}`);
                  } else {
                    console.log(`  Not yet stale (${daysSinceFailure.toFixed(1)} days), keeping open`);
                  }
                } catch (error) {
                  console.error(`Error processing PR #${pr.number}:`, error);
                  // Continue with next PR instead of crashing
                  continue;
                }
              }
            }

            console.log(`\n✅ Stale PR check complete. Checked ${totalPRs} total open PRs.`);
