# CodeQL Security Analysis Workflow
#
# 📚 IMPORTANT FOR AI AGENTS:
# This workflow performs security analysis using CodeQL to detect vulnerabilities
# in JavaScript/TypeScript code. It runs on all PRs and pushes to main.
#
# See docs/code-analysis-tooling-research.md for tooling rationale.
#
name: 'CodeQL Security Analysis'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run at 6 AM UTC every Monday
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use default queries plus security-extended for more thorough analysis
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{matrix.language}}'
