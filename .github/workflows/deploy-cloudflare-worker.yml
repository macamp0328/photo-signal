name: Deploy Cloudflare Audio Worker

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment label for the deployment'
        required: false
        default: 'production'

concurrency:
  group: cloudflare-audio-worker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
        env:
          NODE_ENV: production
          WRANGLER_SEND_METRICS: false
