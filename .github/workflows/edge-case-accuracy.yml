# Edge Case Accuracy Reporting
#
# Runs edge case accuracy regression tests and posts results to PR
# Ensures accuracy targets are maintained across changes
# Only runs when photo recognition code changes
#
name: Edge Case Accuracy Report

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/modules/photo-recognition/**'
      - 'src/services/photo-recognition-service/**'
      - 'assets/test-data/**'
      - 'scripts/generate-photo-hashes.js'
      - 'scripts/create-edge-case-test-images.js'
  workflow_dispatch:

jobs:
  accuracy-report:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write # For posting comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run edge case accuracy tests
        id: accuracy-tests
        run: |
          # Run tests and capture output
          npm run test:run -- src/modules/photo-recognition/__tests__/edgeCaseAccuracy.test.ts > test-output.txt 2>&1 || true

          # Extract performance summary from output
          if grep -q "Edge Case Performance Summary" test-output.txt; then
            echo "TESTS_RAN=true" >> $GITHUB_OUTPUT
            
            # Extract key metrics
            avg_accuracy=$(grep "Average Accuracy:" test-output.txt | awk '{print $3}')
            pass_rate=$(grep "Pass Rate:" test-output.txt | awk '{print $3}')
            
            echo "AVG_ACCURACY=$avg_accuracy" >> $GITHUB_OUTPUT
            echo "PASS_RATE=$pass_rate" >> $GITHUB_OUTPUT
          else
            echo "TESTS_RAN=false" >> $GITHUB_OUTPUT
          fi

          # Save full output for comment
          cat test-output.txt

      - name: Create accuracy report comment
        if: steps.accuracy-tests.outputs.TESTS_RAN == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('test-output.txt', 'utf8');

            // Extract performance table from output
            const summaryMatch = output.match(/━{80}[\s\S]*?━{80}/);
            const performanceTable = summaryMatch ? summaryMatch[0] : 'Performance summary not found';

            // Create markdown comment
            const comment = `## 📊 Edge Case Accuracy Report

            **Average Accuracy**: ${{ steps.accuracy-tests.outputs.AVG_ACCURACY }}
            **Pass Rate**: ${{ steps.accuracy-tests.outputs.PASS_RATE }}

            <details>
            <summary>📈 Detailed Performance Breakdown</summary>

            \`\`\`
            ${performanceTable}
            \`\`\`

            </details>

            ### 🎯 Accuracy Targets

            These tests validate that photo recognition meets expected accuracy thresholds for each edge case category as documented in \`docs/image-recognition-exploratory-analysis.md\` Section 4.

            | Category | Target Accuracy |
            |----------|-----------------|
            | Motion Blur (Light) | ≥80% |
            | Motion Blur (Moderate) | ≥60% |
            | Motion Blur (Heavy) | ≥40% |
            | Glare (Light) | ≥85% |
            | Glare (Moderate/Heavy) | ≥70% |
            | Low Light | ≥75% |
            | Angle (15°) | ≥85% |
            | Angle (30°) | ≥70% |
            | Angle (45°) | ≥50% |
            | Combined Challenges | ≥60% |

            **Overall Baseline**: ≥65% average accuracy

            ---

            *This report is automatically generated by the Edge Case Accuracy workflow. See [edgeCaseAccuracy.test.ts](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/src/modules/photo-recognition/__tests__/edgeCaseAccuracy.test.ts) for test implementation.*
            `;

            // Post comment
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Check accuracy thresholds
        if: steps.accuracy-tests.outputs.TESTS_RAN == 'true'
        run: |
          # Extract numeric values (remove % sign)
          avg_accuracy="${{ steps.accuracy-tests.outputs.AVG_ACCURACY }}"
          avg_numeric="${avg_accuracy%\%}"

          # Check if average accuracy is above baseline (65%)
          if (( $(echo "$avg_numeric < 65" | bc -l) )); then
            echo "❌ Average accuracy ($avg_accuracy) is below 65% baseline threshold"
            exit 1
          else
            echo "✅ Average accuracy ($avg_accuracy) meets or exceeds 65% baseline"
          fi

          # Extract pass rate
          pass_rate="${{ steps.accuracy-tests.outputs.PASS_RATE }}"
          pass_numeric="${pass_rate%\%*}"

          # Check if pass rate is at least 75%
          if (( $(echo "$pass_numeric < 75" | bc -l) )); then
            echo "❌ Pass rate ($pass_rate) is below 75% threshold"
            exit 1
          else
            echo "✅ Pass rate ($pass_rate) meets or exceeds 75% threshold"
          fi

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: edge-case-accuracy-report
          path: test-output.txt
          retention-days: 30
