# Manage Labels - Ensure required labels exist
#
# This workflow creates and maintains standard labels for the repository,
# especially those used by Dependabot for automated dependency updates.
#
# Labels created:
# - automated: Indicates automated PRs (e.g., Dependabot)
# - dependencies: Indicates dependency updates
# - npm: Indicates npm package updates
# - github-actions: Indicates GitHub Actions updates
#
name: Manage Labels

on:
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - '.github/workflows/manage-labels.yml'

permissions:
  issues: write
  pull-requests: write

jobs:
  create-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Create or update labels
        uses: actions/github-script@v8
        with:
          script: |
            const labels = [
              {
                name: 'automated',
                color: '0e8a16',
                description: 'Automated pull requests (e.g., Dependabot)'
              },
              {
                name: 'dependencies',
                color: '0366d6',
                description: 'Dependency updates'
              },
              {
                name: 'npm',
                color: 'cb3837',
                description: 'npm package updates'
              },
              {
                name: 'github-actions',
                color: '2088ff',
                description: 'GitHub Actions updates'
              }
            ];

            for (const labelData of labels) {
              try {
                // Try to get the label
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelData.name
                });
                
                // Label exists, update it
                try {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: labelData.name,
                    color: labelData.color,
                    description: labelData.description
                  });
                  
                  console.log(`✅ Updated label: ${labelData.name}`);
                } catch (updateError) {
                  console.error(`❌ Error updating label ${labelData.name}:`, updateError);
                  // Continue with next label instead of crashing
                  continue;
                }
              } catch (error) {
                if (error.status === 404) {
                  // Label doesn't exist, create it
                  try {
                    await github.rest.issues.createLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      name: labelData.name,
                      color: labelData.color,
                      description: labelData.description
                    });
                    
                    console.log(`✅ Created label: ${labelData.name}`);
                  } catch (createError) {
                    console.error(`❌ Error creating label ${labelData.name}:`, createError);
                    // Continue with next label instead of crashing
                    continue;
                  }
                } else {
                  console.error(`❌ Error checking label ${labelData.name}:`, error);
                  // Continue with next label instead of crashing
                  continue;
                }
              }
            }

            console.log('✅ All labels processed successfully');
