# PR Checks Monitor - Auto-comment on failing checks
#
# This workflow monitors pull requests and automatically comments when
# GitHub Actions checks fail, reminding contributors (especially AI agents)
# to fix the issues before requesting review.
#
name: PR Checks Monitor

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed

permissions:
  pull-requests: write
  checks: read
  contents: read

jobs:
  comment-on-failure:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Get PR number
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`
            });

            if (pulls.data.length > 0) {
              return pulls.data[0].number;
            }
            return null;

      - name: Check if AI agent PR
        id: check_ai
        if: steps.pr.outputs.result != 'null'
        uses: actions/github-script@v8
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.pr.outputs.result }}
            });

            // Check if PR is from an AI agent (Copilot, or other bots)
            const aiAgentPrefixes = ['copilot/', 'ai/', 'agent/'];
            const isAiAgent = aiAgentPrefixes.some(prefix => 
              pr.data.head.ref.toLowerCase().startsWith(prefix)
            ) || pr.data.user.type === 'Bot';

            // Check if @copilot is assigned to the PR
            const copilotAssigned = pr.data.assignees?.some(assignee => 
              assignee.login === 'copilot'
            ) || false;

            return { isAiAgent, copilotAssigned };

      - name: Comment on PR with failure details
        if: steps.pr.outputs.result != 'null'
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.result }};
            const checkResult = ${{ steps.check_ai.outputs.result || '{}' }};
            const isAiAgent = checkResult.isAiAgent || false;
            const copilotAssigned = checkResult.copilotAssigned || false;
            const runId = context.payload.workflow_run.id;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            // Get existing comments
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            // Check if we already commented on this run
            const existingComment = comments.data.find(comment => 
              comment.body.includes(`ci-failure-${runId}`)
            );

            if (existingComment) {
              console.log('Already commented on this failure');
              return;
            }

            // Build appropriate message based on contributor type
            let message = '';

            // Always add @copilot mention for all PR failures
            const copilotMention = '@copilot ';

            if (isAiAgent) {
              message = [
                '## ⚠️ GitHub Actions Checks Failed',
                '',
                `<!-- ci-failure-${runId} -->`,
                '',
                `${copilotMention}**Action Required**: This PR has failing GitHub Actions checks that must be fixed before review.`,
                '',
                '### 🤖 AI Agent Responsibilities',
                '',
                'As per [CONTRIBUTING.md](CONTRIBUTING.md#ai-agent-pr-policy), AI agents must:',
                '',
                `1. **Investigate the failure** using the [GitHub Actions logs](${runUrl})`,
                '2. **Fix the root cause** locally',
                '3. **Verify the fix** by running all checks locally:',
                '   ```bash',
                '   npm run lint:fix',
                '   npm run format',
                '   npm run type-check',
                '   npm run build',
                '   npm run test:run',
                '   ```',
                '4. **Push the fix** to this PR branch',
                '5. **Verify checks now pass** in GitHub Actions',
                '',
                '### 📋 Common Failures and Fixes',
                '',
                '**Linting errors**: Run `npm run lint:fix` to auto-fix',
                '**Formatting issues**: Run `npm run format` to auto-format all files',
                '**Type errors**: Fix TypeScript errors in reported files',
                '**Build failures**: Check for syntax errors or missing dependencies',
                '**Test failures**: Fix failing tests or update test expectations',
                '',
                '### ⏱️ Timeline',
                '',
                'Please fix these issues **within 7 days** or the PR may be closed.',
                '',
                '### 📚 Resources',
                '',
                '- [CONTRIBUTING.md](CONTRIBUTING.md) - Complete contribution guidelines',
                '- [SETUP.md](SETUP.md) - Development environment setup',
                `- [CI Logs](${runUrl}) - Detailed failure information`,
                '',
                '---',
                '',
                '**Note**: This is an automated message. PRs with failing checks will not be reviewed until all issues are resolved.'
              ].join('\n');
            } else {
              message = [
                '## ⚠️ GitHub Actions Checks Failed',
                '',
                `<!-- ci-failure-${runId} -->`,
                '',
                `${copilotMention}Some checks failed for this PR. Please review the [CI logs](${runUrl}) and fix the issues.`,
                '',
                '### How to Fix',
                '',
                `1. Review the [failed checks](${runUrl}) to understand what went wrong`,
                '2. Fix the issues locally',
                '3. Run all quality checks:',
                '   ```bash',
                '   npm run lint:fix',
                '   npm run format',
                '   npm run type-check',
                '   npm run build',
                '   npm run test:run',
                '   ```',
                '4. Push your fixes',
                '5. Verify all checks pass',
                '',
                '### Common Issues',
                '',
                '- **Linting**: Run `npm run lint:fix` to auto-fix most issues',
                '- **Formatting**: Run `npm run format` to format all files',
                '- **Type errors**: Fix TypeScript errors in the reported files',
                '- **Build failures**: Check for syntax errors or missing dependencies',
                '- **Test failures**: Update tests or fix the code to pass tests',
                '',
                'See [CONTRIBUTING.md](CONTRIBUTING.md) for complete guidelines.',
                '',
                '---',
                '',
                '**Note**: This PR will not be reviewed until all checks pass.'
              ].join('\n');
            }

            // Post the comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: message
            });

            console.log(`Posted failure comment on PR #${prNumber}`);

      - name: Add label to PR
        if: steps.pr.outputs.result != 'null'
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.result }};

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['ci-failing', 'needs-fixes']
              });
              console.log('Added labels to PR');
            } catch (error) {
              console.log('Could not add labels (they may not exist yet):', error.message);
            }

  comment-on-success:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Get PR number
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`
            });

            if (pulls.data.length > 0) {
              return pulls.data[0].number;
            }
            return null;

      - name: Remove failure labels
        if: steps.pr.outputs.result != 'null'
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.result }};

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: 'ci-failing'
              });
              console.log('Removed ci-failing label');
            } catch (error) {
              console.log('Label ci-failing not found or already removed');
            }

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: 'needs-fixes'
              });
              console.log('Removed needs-fixes label');
            } catch (error) {
              console.log('Label needs-fixes not found or already removed');
            }

      - name: Comment on success after previous failure
        if: steps.pr.outputs.result != 'null'
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.result }};

            // Get existing comments to see if there were previous failures
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const hadFailures = comments.data.some(comment => 
              comment.body.includes('ci-failure-')
            );

            // Only comment if there were previous failures
            if (hadFailures) {
              const message = [
                '## ✅ All Checks Passing',
                '',
                'Great work! All GitHub Actions checks are now passing. This PR is ready for review.',
                '',
                '### Next Steps',
                '',
                '- Wait for code review from maintainers',
                '- Address any review feedback',
                '- Once approved, PR will be merged',
                '',
                'Thank you for fixing the issues promptly! 🎉'
              ].join('\n');
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: message
              });
              console.log('Posted success comment on PR');
            }
