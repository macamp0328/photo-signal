# Visual Regression Testing Workflow
#
name: Visual Regression Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Regenerate visual baselines and commit them back to the branch'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      branch:
        description: 'Branch to update snapshots on (required when update_snapshots is true)'
        required: false
        default: ''

concurrency:
  group: visual-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Regular visual regression checks (PR / push / manual run without update) ──
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip when dispatched specifically to update snapshots — that job handles it
    if: "!(github.event_name == 'workflow_dispatch' && inputs.update_snapshots == 'true')"

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package-lock.json').packages['node_modules/playwright-core'].version)")
          echo "version=$PLAYWRIGHT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build project
        run: npm run build

      - name: Run smoke visual checks (Mobile Chrome + Mobile Safari)
        run: npx cross-env CI=1 NODE_ENV=production PLAYWRIGHT_HTML_OPEN=never playwright test --grep @smoke --project "Mobile Chrome" --project "Mobile Safari"
        continue-on-error: true
        id: smoke

      - name: Run extended visual checks (mobile projects)
        run: npx cross-env CI=1 NODE_ENV=production PLAYWRIGHT_HTML_OPEN=never playwright test --grep @extended
        continue-on-error: true
        id: extended

      - name: Upload test results
        if: always() && (steps.smoke.outcome == 'failure' || steps.extended.outcome == 'failure')
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload visual diff artifacts
        if: always() && (steps.smoke.outcome == 'failure' || steps.extended.outcome == 'failure') && hashFiles('test-results/**/*-diff.png') != ''
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: visual-diff-results
          path: test-results/
          retention-days: 30

      - name: Comment PR with results
        if: always() && (steps.smoke.outcome == 'failure' || steps.extended.outcome == 'failure') && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // Check if test-results directory exists and recursively search for diff images
            const testResultsDir = 'test-results';
            let hasVisualDiffs = false;

            // Recursive function to walk directory tree and find diff images
            function findDiffImages(dir) {
              try {
                const entries = fs.readdirSync(dir, { withFileTypes: true });
                for (const entry of entries) {
                  const fullPath = path.join(dir, entry.name);
                  if (entry.isDirectory()) {
                    if (findDiffImages(fullPath)) return true;
                  } else if (entry.name.endsWith('-diff.png')) {
                    return true; // Found a diff
                  }
                }
              } catch (error) {
                console.log(`Error reading directory ${dir}:`, error.message || error);
              }
              return false;
            }

            try {
              if (fs.existsSync(testResultsDir)) {
                hasVisualDiffs = findDiffImages(testResultsDir);
              }
            } catch (error) {
              console.log('Error checking test results:', error);
            }

            const smokeFailed = '${{ steps.smoke.outcome }}' === 'failure';
            const extendedFailed = '${{ steps.extended.outcome }}' === 'failure';

            const statusHeader = '## ❌ Visual changes detected';

            const tierSummary = `\n- Blocking smoke tier: ${smokeFailed ? 'FAILED' : 'PASSED'}\n- Informational extended tier: ${extendedFailed ? 'FAILED' : 'PASSED'}`;

            const comment = hasVisualDiffs
              ? `${statusHeader}${tierSummary}

            Visual differences were detected in this PR. Please review the changes:

            1. Download the \`visual-diff-results\` artifact from the workflow run
            2. Review the diff images to verify changes are intentional
            3. If changes are intentional:
               - Run \`npx playwright test --update-snapshots\` locally
               - Commit the updated baseline screenshots
            4. If changes are unintentional, fix the CSS/UI issue

            See [Visual Regression Test Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
              : `${statusHeader}${tierSummary}

            The visual regression tests failed. Please check the [test report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if any visual checks detected changes
        if: steps.smoke.outcome == 'failure' || steps.extended.outcome == 'failure'
        run: exit 1

  # ── Snapshot regeneration (workflow_dispatch with update_snapshots=true only) ──
  update-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' && inputs.update_snapshots == 'true'

    permissions:
      contents: write # needed to commit and push updated baselines

    steps:
      - name: Validate branch input
        run: |
          BRANCH="${{ inputs.branch }}"
          if [ -z "$BRANCH" ]; then
            echo "Error: 'branch' input is required when update_snapshots is true."
            exit 1
          fi
          if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
            echo "Error: Cannot update snapshots directly on main/master. Target a feature branch."
            exit 1
          fi
          echo "Target branch: $BRANCH"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package-lock.json').packages['node_modules/playwright-core'].version)")
          echo "version=$PLAYWRIGHT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build project
        run: npm run build

      - name: Regenerate snapshots
        run: |
          if ! npx cross-env CI=1 NODE_ENV=production PLAYWRIGHT_HTML_OPEN=never playwright test --update-snapshots; then
            echo "::warning::playwright --update-snapshots exited non-zero. Snapshots may be partially regenerated — check the logs above for test errors."
          fi

      - name: Commit and push updated baselines
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "No snapshot changes to commit."
          else
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add tests/visual
            git commit -m "chore: update visual regression baselines" \
              -m "Regenerated by workflow_dispatch on $(date -u +'%Y-%m-%d %H:%M UTC') from ubuntu-latest."
            git push
            echo "Snapshots updated and pushed."
          fi
