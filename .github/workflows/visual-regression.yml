# Visual Regression Testing Workflow
#
name: Visual Regression Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: visual-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      pull-requests: write # For commenting on PRs with results

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build project
        run: npm run build

      - name: Run blocking visual smoke checks (Mobile Chrome + Mobile Safari)
        run: npm run test:visual:smoke
        continue-on-error: true
        id: smoke

      - name: Run informational visual checks (non-blocking)
        run: npm run test:visual:extended
        continue-on-error: true
        id: extended

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload visual diff artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: visual-diff-results
          path: test-results/
          retention-days: 30

      - name: Comment PR with results
        if: (steps.smoke.outcome == 'failure' || steps.extended.outcome == 'failure') && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // Check if test-results directory exists
            const testResultsDir = 'test-results';
            let hasVisualDiffs = false;

            try {
              if (fs.existsSync(testResultsDir)) {
                const files = fs.readdirSync(testResultsDir);
                hasVisualDiffs = files.some(f => f.includes('-diff.png'));
              }
            } catch (error) {
              console.log('Error checking test results:', error);
            }

            const smokeFailed = '${{ steps.smoke.outcome }}' === 'failure';
            const extendedFailed = '${{ steps.extended.outcome }}' === 'failure';

            const statusHeader = smokeFailed
              ? '## ❌ Blocking visual smoke checks failed'
              : '## ⚠️ Informational visual checks found differences';

            const tierSummary = `\n- Blocking smoke tier: ${smokeFailed ? 'FAILED' : 'PASSED'}\n- Informational extended tier: ${extendedFailed ? 'FAILED' : 'PASSED'}`;

            const comment = hasVisualDiffs
              ? `${statusHeader}${tierSummary}

            Visual differences were detected in this PR. Please review the changes:

            1. Download the \`visual-diff-results\` artifact from the workflow run
            2. Review the diff images to verify changes are intentional
            3. If changes are intentional:
               - Run \`npx playwright test --update-snapshots\` locally
               - Commit the updated baseline screenshots
            4. If changes are unintentional, fix the CSS/UI issue

            See [Visual Regression Test Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
              : `${statusHeader}${tierSummary}

            The visual regression tests failed. Please check the [test report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if blocking smoke tests failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1
