<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#0a0800"/>

  <!-- The photo is the source. Two rings pulse outward from it. -->

  <!-- Outer pulse ring -->
  <rect x="14" y="6" width="72" height="88" rx="8"  fill="none" stroke="#d4892a" stroke-width="1.5" opacity="0.25"/>
  <!-- Inner pulse ring -->
  <rect x="22" y="14" width="56" height="72" rx="5" fill="none" stroke="#d4892a" stroke-width="2.5" opacity="0.52"/>
  <!-- Photo frame — portrait, bold, the source -->
  <rect x="30" y="22" width="40" height="56" rx="3" fill="#0a0800" stroke="#d4892a" stroke-width="5"/>
</svg>
