<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#0a0800"/>

  <!-- Photo frame (landscape, centered) — outer arcs align exactly with its top/bottom corners -->
  <rect x="30" y="36" width="40" height="28" rx="2" fill="#130c00" stroke="#d4892a" stroke-width="5"/>

  <!-- Left broadcast arcs -->
  <path d="M 30 44 A 6 6 0 1 1 30 56"   fill="none" stroke="#d4892a" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M 30 40 A 10 10 0 1 1 30 60" fill="none" stroke="#d4892a" stroke-width="4"   stroke-linecap="round" opacity="0.65"/>
  <path d="M 30 36 A 14 14 0 1 1 30 64" fill="none" stroke="#d4892a" stroke-width="3"   stroke-linecap="round" opacity="0.35"/>

  <!-- Right broadcast arcs -->
  <path d="M 70 44 A 6 6 0 1 1 70 56"   fill="none" stroke="#d4892a" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M 70 40 A 10 10 0 1 1 70 60" fill="none" stroke="#d4892a" stroke-width="4"   stroke-linecap="round" opacity="0.65"/>
  <path d="M 70 36 A 14 14 0 1 1 70 64" fill="none" stroke="#d4892a" stroke-width="3"   stroke-linecap="round" opacity="0.35"/>
</svg>
