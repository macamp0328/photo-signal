<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0800"/>

  <!-- Subtle scan-line texture -->
  <defs>
    <pattern id="scanlines" x="0" y="0" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect width="1200" height="1" y="0" fill="#d4892a" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#scanlines)"/>

  <!-- Signal icon (left side) — photo as signal source -->
  <g transform="translate(192, 160)">
    <!-- Outer arc -->
    <path d="M -134 240 A 134 134 0 0 0 134 240" fill="none" stroke="#d4892a" stroke-width="14" stroke-linecap="round" opacity="0.35"/>
    <!-- Middle arc -->
    <path d="M -96 240 A 96 96 0 0 0 96 240" fill="none" stroke="#d4892a" stroke-width="18" stroke-linecap="round" opacity="0.65"/>
    <!-- Inner arc — endpoints align with photo top corners -->
    <path d="M -57 240 A 57 57 0 0 0 57 240" fill="none" stroke="#d4892a" stroke-width="22" stroke-linecap="round"/>
    <!-- Photo frame -->
    <rect x="-57" y="240" width="114" height="84" rx="5" fill="#130c00" stroke="#d4892a" stroke-width="8"/>
    <!-- Photo interior: horizon line -->
    <line x1="-46" y1="295" x2="46" y2="295" stroke="#d4892a" stroke-width="3" opacity="0.4"/>
    <!-- Photo interior: sun/subject circle -->
    <circle cx="0" cy="273" r="14" fill="none" stroke="#d4892a" stroke-width="3" opacity="0.4"/>
  </g>

  <!-- Divider -->
  <line x1="430" y1="160" x2="430" y2="470" stroke="#d4892a" stroke-width="1" opacity="0.2"/>

  <!-- Main title -->
  <text x="490" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="900" fill="#d4892a" letter-spacing="-2">
    Photo Signal
  </text>

  <!-- Tagline -->
  <text x="490" y="385" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="400" fill="#d4892a" opacity="0.55" letter-spacing="2">
    Still Broadcasting.
  </text>

  <!-- Bottom metadata -->
  <text x="490" y="460" font-family="ui-monospace, 'SF Mono', 'Menlo', monospace" font-size="18" fill="#d4892a" opacity="0.3" letter-spacing="3">
    CAMERA-BASED MUSIC GALLERY
  </text>
</svg>
