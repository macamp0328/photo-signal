<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0800"/>

  <!-- Subtle scan-line texture -->
  <defs>
    <pattern id="scanlines" x="0" y="0" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect width="1200" height="1" y="0" fill="#d4892a" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#scanlines)"/>

  <!-- Signal icon — portrait photo with pulsing concentric rings, centered at (215, 315) -->
  <!-- Photo: 160×220, centered at (215,315) → x=135 y=205 -->

  <!-- Outer pulse ring -->
  <rect x="107" y="177" width="216" height="276" rx="22" fill="none" stroke="#d4892a" stroke-width="4"  opacity="0.25"/>
  <!-- Inner pulse ring -->
  <rect x="121" y="191" width="188" height="248" rx="16" fill="none" stroke="#d4892a" stroke-width="7"  opacity="0.52"/>
  <!-- Photo frame — portrait, bold -->
  <rect x="135" y="205" width="160" height="220" rx="10" fill="#0a0800" stroke="#d4892a" stroke-width="14"/>

  <!-- Photo interior: sun + horizon — visible at this scale -->
  <circle cx="215" cy="268" r="28" fill="none" stroke="#d4892a" stroke-width="5" opacity="0.32"/>
  <line x1="152" y1="358" x2="278" y2="358" stroke="#d4892a" stroke-width="4" opacity="0.32"/>

  <!-- Divider -->
  <line x1="460" y1="150" x2="460" y2="480" stroke="#d4892a" stroke-width="1" opacity="0.18"/>

  <!-- Main title -->
  <text x="520" y="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="100" font-weight="900" fill="#d4892a" letter-spacing="-2">
    Photo Signal
  </text>

  <!-- Tagline -->
  <text x="520" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="400" fill="#d4892a" opacity="0.5" letter-spacing="2">
    Still Broadcasting.
  </text>

  <!-- Bottom metadata -->
  <text x="520" y="468" font-family="ui-monospace, 'SF Mono', 'Menlo', monospace" font-size="18" fill="#d4892a" opacity="0.28" letter-spacing="3">
    CAMERA-BASED MUSIC GALLERY
  </text>
</svg>
